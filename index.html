<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waltham Abbey Thai Massage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-[#F8F4ED]">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-[#C19A6B] rounded-2xl flex items-center justify-center text-white text-3xl">🪷</div>
                <div>
                    <span class="text-3xl font-light">Waltham Abbey</span>
                    <span class="block text-[#C19A6B] text-xs tracking-widest -mt-1">THAI MASSAGE</span>
                </div>
            </div>
            <a href="#book" class="px-8 py-3.5 bg-[#C19A6B] text-white rounded-2xl hover:bg-[#B08A5A]">Book Now</a>
        </div>
    </nav>

    <!-- HERO with your Buddha image -->
    <section class="relative h-screen flex items-center text-white">
        <img src="buddha.jpg" 
             class="absolute inset-0 w-full h-full object-cover" 
             alt="Serene Buddha Statue">
        <div class="absolute inset-0 bg-gradient-to-r from-black/70 to-black/40"></div>
        
        <div class="relative z-10 max-w-7xl mx-auto px-8">
            <div class="max-w-xl">
                <p class="flex items-center gap-2 text-[#F4E4C9] text-sm tracking-widest">
                    <span class="text-xl">🪷</span> BUDDHIST-INSPIRED HEALING
                </p>
                <h1 class="text-6xl md:text-7xl font-light mt-4 leading-none">Peace in every touch</h1>
                <p class="mt-6 text-xl">Authentic Thai massage rooted in mindfulness and compassion.</p>
                
                <a href="#book" class="mt-10 inline-block bg-white text-neutral-900 px-10 py-4 rounded-3xl text-lg font-medium hover:bg-neutral-100">
                    Book Your Session
                </a>
            </div>
        </div>
    </section>

    <!-- Simple content area -->
    <section class="py-20 text-center">
        <img src="buddha.jpg" class="mx-auto rounded-3xl shadow-2xl max-h-[500px] object-cover" alt="Buddha Statue">
    </section>

    <!-- Booking -->
    <section id="book" class="bg-[#C19A6B] py-24 text-white text-center">
        <h2 class="text-5xl font-light">Begin your healing journey</h2>
        <a href="https://calendly.com" target="_blank" class="mt-10 inline-block bg-white text-[#C19A6B] px-14 py-6 rounded-3xl text-xl font-medium">
            Book Appointment
        </a>
    </section>

    <footer class="bg-neutral-900 text-white py-12 text-center">
        <p>© 2026 Waltham Abbey Thai Massage • Essex</p>
    </footer>
</body>
</html>
