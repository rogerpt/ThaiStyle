<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waltham Abbey Thai Massage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', sans-serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(40,30,25,0.7), rgba(40,30,25,0.7)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover;
        }
    </style>
</head>
<body class="bg-[#F8F4ED]">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-[#C19A6B] rounded-2xl flex items-center justify-center text-3xl">🪷</div>
                <div class="text-3xl font-light">Waltham Abbey Thai Massage</div>
            </div>
            <a href="#book" class="px-8 py-3.5 bg-[#C19A6B] text-white rounded-2xl">Book Now</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-6xl mx-auto px-8 text-center md:text-left">
            <p class="text-[#F4E4C9] tracking-widest">🪷 AUTHENTIC THAI WELLNESS</p>
            <h1 class="text-6xl md:text-7xl font-light mt-4 leading-none">Peace • Balance • Renewal</h1>
            <p class="mt-6 text-xl max-w-md mx-auto md:mx-0">
                Traditional Thai massage in the spirit of Buddhist mindfulness
            </p>
            <a href="#book" class="mt-10 inline-block bg-white text-neutral-900 px-12 py-5 rounded-3xl text-lg font-medium">
                Book Your Session
            </a>
        </div>
    </section>

    <!-- All other images are now spa/Buddha/herbal themed -->
    <section class="max-w-7xl mx-auto px-8 py-20">
        <img src="https://picsum.photos/id/1015/1200/600" class="rounded-3xl mx-auto" alt="Thai Buddha massage space">
    </section>

    <section id="book" class="bg-[#C19A6B] py-24 text-white text-center">
        <h2 class="text-5xl font-light">Ready to experience real Thai healing?</h2>
        <a href="https://calendly.com" target="_blank" class="mt-8 inline-block bg-white text-[#C19A6B] px-12 py-6 rounded-3xl text-xl">
            Reserve Your Appointment
        </a>
    </section>

    <footer class="bg-neutral-900 text-white py-12 text-center">
        <p>Waltham Abbey Thai Massage • Essex</p>
    </footer>
</body>
</html>
