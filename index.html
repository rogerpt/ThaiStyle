<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waltham Abbey Thai Massage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', sans-serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(30, 25, 20, 0.65), rgba(30, 25, 20, 0.65)), 
                        url('https://picsum.photos/id/1016/2000/1200') center/cover no-repeat;
        }
    </style>
</head>
<body class="bg-[#F8F4ED]">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-[#C19A6B] rounded-2xl flex items-center justify-center text-white text-3xl">🪷</div>
                <div>
                    <span class="text-3xl font-light tracking-tight">Waltham Abbey</span>
                    <span class="block text-[#C19A6B] text-xs tracking-widest -mt-1">THAI MASSAGE</span>
                </div>
            </div>
            <a href="#book" class="px-8 py-3.5 bg-[#C19A6B] text-white rounded-2xl hover:bg-[#B08A5A]">Book Now</a>
        </div>
    </nav>

    <!-- HERO - Using your Buddha image -->
    <section class="h-screen flex items-center text-white relative">
        <img src="YOUR-BUDDHA-IMAGE.jpg" 
             class="absolute inset-0 w-full h-full object-cover" 
             alt="Serene Buddha Statue">
        <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-black/40 to-transparent"></div>
        
        <div class="max-w-7xl mx-auto px-8 relative z-10 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="flex items-center gap-3 text-[#F4E4C9]">
                    <span class="text-4xl">🪷</span>
                    <span class="uppercase tracking-[3px] text-sm font-medium">Buddhist-Inspired Healing</span>
                </div>
                <h1 class="text-6xl md:text-7xl font-light leading-none">Peace in every touch</h1>
                <p class="text-xl max-w-md">Authentic Thai massage rooted in mindfulness and compassion.</p>
                <a href="#book" class="inline-block bg-white text-neutral-900 px-12 py-5 rounded-3xl text-lg font-medium">
                    Book Your Session
                </a>
            </div>
        </div>
    </section>

    <!-- Rest of the page (clean & peaceful) -->
    <section class="max-w-7xl mx-auto px-8 py-24 text-center">
        <img src="YOUR-BUDDHA-IMAGE.jpg" class="rounded-3xl mx-auto shadow-2xl max-h-[500px] object-cover" alt="Buddha Statue">
    </section>

    <section id="book" class="bg-[#C19A6B] text-white py-24 text-center">
        <h2 class="text-5xl font-light">Begin your journey to inner peace</h2>
        <a href="https://calendly.com" target="_blank" 
           class="mt-10 inline-block bg-white text-[#C19A6B] px-14 py-6 rounded-3xl text-xl font-medium">
            Book Appointment
        </a>
    </section>

    <footer class="bg-neutral-900 text-white py-12 text-center">
        <p>© 2026 Waltham Abbey Thai Massage • Essex</p>
    </footer>

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener("click", function(e) {
                if (this.getAttribute("href").length > 1) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute("href")).scrollIntoView({ behavior: "smooth" });
                }
            });
        });
    </script>
</body>
</html>
